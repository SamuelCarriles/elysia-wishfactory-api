services:
  db:
    image: postgres:18.1
    container_name: wishfactory-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - wishfactory-net

volumes:
  pgdata:

networks:
  wishfactory-net:
    driver: bridge
